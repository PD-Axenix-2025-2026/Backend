name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-and-tests:
    name: Quality And Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry

      - name: Install Poetry
        run: pip install "poetry==2.1.1"

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Check formatting
        run: poetry run ruff format --check app tests

      - name: Run linter
        run: poetry run ruff check app tests

      - name: Run type checker
        run: poetry run mypy app tests

      - name: Run tests
        run: poetry run pytest -q

  docker-checks:
    name: Docker Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate Docker Compose configuration
        run: docker compose --profile dev config

      - name: Build backend image
        run: docker compose --profile dev build backend
